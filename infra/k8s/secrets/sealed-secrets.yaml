# Sealed Secrets — encrypt with kubeseal before committing
# kubeseal --format yaml < secret.yaml > sealed-secret.yaml
#
# This file contains placeholder values. In production, use Bitnami Sealed Secrets
# to encrypt sensitive values so they can be safely stored in git.
apiVersion: v1
kind: Secret
metadata:
  name: microservices-secrets
  namespace: microservices
type: Opaque
stringData:
  JWT_SECRET: "change-me-in-production-use-sealed-secrets"
  GATEWAY_SECRET: "change-me-in-production-use-sealed-secrets"
  POSTGRES_PASSWORD: "change-me-in-production"
