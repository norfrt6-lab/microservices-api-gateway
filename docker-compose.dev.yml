services:
  # --- Infrastructure (same as prod) ---

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/docker/init-databases.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  nats:
    image: nats:2.10-alpine
    ports:
      - "4222:4222"
      - "8222:8222"
    command: ["--js", "--monitor", "8222"]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8222/healthz || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5

  # --- Observability ---

  jaeger:
    image: jaegertracing/all-in-one:1.54
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"
      - "4317:4317"
      - "4318:4318"

  prometheus:
    image: prom/prometheus:v2.51.0
    ports:
      - "9090:9090"
    volumes:
      - ./infra/docker/prometheus.yml:/etc/prometheus/prometheus.yml
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"

  grafana:
    image: grafana/grafana:10.4.0
    ports:
      - "3100:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
    depends_on:
      - prometheus

  # --- Gateway (dev mode with hot reload) ---

  gateway:
    build:
      context: .
      dockerfile: gateway/Dockerfile.dev
    ports:
      - "3000:3000"
    volumes:
      - ./gateway/src:/app/gateway/src
      - ./shared/src:/app/shared/src
    environment:
      PORT: 3000
      NODE_ENV: development
      JWT_SECRET: dev-jwt-secret
      JWT_EXPIRES_IN: 24h
      GATEWAY_SECRET: dev-gateway-secret
      API_VERSION: v1
      REDIS_URL: redis://redis:6379
      NATS_URL: nats://nats:4222
      RATE_LIMIT_WINDOW_MS: 60000
      RATE_LIMIT_MAX_REQUESTS: 100
      RATE_LIMIT_AUTHENTICATED_MAX: 500
      USER_SERVICE_URL: http://user-service:3001
      PRODUCT_SERVICE_URL: http://product-service:3002
      ORDER_SERVICE_URL: http://order-service:3003
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4318
      OTEL_SERVICE_NAME: gateway
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_healthy

  # --- Services (dev mode with hot reload) ---

  user-service:
    build:
      context: .
      dockerfile: services/user-service/Dockerfile.dev
    ports:
      - "3001:3001"
    volumes:
      - ./services/user-service/src:/app/services/user-service/src
      - ./shared/src:/app/shared/src
    environment:
      PORT: 3001
      NODE_ENV: development
      USER_DB_URL: postgresql://postgres:postgres@postgres:5432/users_db
      NATS_URL: nats://nats:4222
      GATEWAY_SECRET: dev-gateway-secret
      JWT_SECRET: dev-jwt-secret
      JWT_EXPIRES_IN: 24h
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4318
      OTEL_SERVICE_NAME: user-service
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy

  product-service:
    build:
      context: .
      dockerfile: services/product-service/Dockerfile.dev
    ports:
      - "3002:3002"
    volumes:
      - ./services/product-service/src:/app/services/product-service/src
      - ./shared/src:/app/shared/src
    environment:
      PORT: 3002
      NODE_ENV: development
      PRODUCT_DB_URL: postgresql://postgres:postgres@postgres:5432/products_db
      NATS_URL: nats://nats:4222
      GATEWAY_SECRET: dev-gateway-secret
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4318
      OTEL_SERVICE_NAME: product-service
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy

  order-service:
    build:
      context: .
      dockerfile: services/order-service/Dockerfile.dev
    ports:
      - "3003:3003"
    volumes:
      - ./services/order-service/src:/app/services/order-service/src
      - ./shared/src:/app/shared/src
    environment:
      PORT: 3003
      NODE_ENV: development
      ORDER_DB_URL: postgresql://postgres:postgres@postgres:5432/orders_db
      NATS_URL: nats://nats:4222
      REDIS_URL: redis://redis:6379
      GATEWAY_SECRET: dev-gateway-secret
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4318
      OTEL_SERVICE_NAME: order-service
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_healthy

volumes:
  postgres_data:
