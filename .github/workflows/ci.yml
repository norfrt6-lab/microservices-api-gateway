name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

env:
  NODE_VERSION: "20"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npm run lint

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        workspace:
          - gateway
          - shared
          - services/user-service
          - services/product-service
          - services/order-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - name: Run tests
        run: npm test --workspace=${{ matrix.workspace }}

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npm run build

  security:
    name: Security Scan (SCA + SBOM + Container)
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - name: SCA (npm audit)
        continue-on-error: ${{ github.ref != 'refs/heads/main' }}
        run: npm audit --audit-level=high
      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          format: spdx-json
          output-file: sbom.spdx.json
          upload-to-github: true
      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.spdx.json
      - name: Build images
        run: |
          docker build -f gateway/Dockerfile -t local/gateway:ci .
          docker build -f services/user-service/Dockerfile -t local/user-service:ci .
          docker build -f services/product-service/Dockerfile -t local/product-service:ci .
          docker build -f services/order-service/Dockerfile -t local/order-service:ci .
      - name: Container scan (gateway)
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: local/gateway:ci
          format: sarif
          output: trivy-gateway.sarif
          severity: CRITICAL,HIGH
          exit-code: "1"
      - name: Upload Trivy SARIF (gateway)
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-gateway.sarif
      - name: Container scan (user-service)
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: local/user-service:ci
          format: sarif
          output: trivy-user-service.sarif
          severity: CRITICAL,HIGH
          exit-code: "1"
      - name: Upload Trivy SARIF (user-service)
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-user-service.sarif
      - name: Container scan (product-service)
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: local/product-service:ci
          format: sarif
          output: trivy-product-service.sarif
          severity: CRITICAL,HIGH
          exit-code: "1"
      - name: Upload Trivy SARIF (product-service)
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-product-service.sarif
      - name: Container scan (order-service)
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: local/order-service:ci
          format: sarif
          output: trivy-order-service.sarif
          severity: CRITICAL,HIGH
          exit-code: "1"
      - name: Upload Trivy SARIF (order-service)
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-order-service.sarif

  integration:
    name: Integration (Docker Compose)
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - name: Build stack
        run: docker compose -f docker-compose.yml build
      - name: Start stack
        run: docker compose -f docker-compose.yml up -d
      - name: Wait for services
        run: sleep 30
      - name: Run integration tests
        env:
          USER_DB_URL: postgresql://postgres:postgres@localhost:5432/users_db
          PRODUCT_DB_URL: postgresql://postgres:postgres@localhost:5432/products_db
          ORDER_DB_URL: postgresql://postgres:postgres@localhost:5432/orders_db
        run: |
          chmod +x scripts/integration-test.sh
          ./scripts/integration-test.sh http://localhost:3000
      - name: Run contract tests
        run: npm run test:contract
      - name: Shutdown stack
        if: always()
        run: docker compose -f docker-compose.yml down -v

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: integration
    if: github.ref == 'refs/heads/main'
    strategy:
      matrix:
        service:
          - name: gateway
            context: .
            dockerfile: gateway/Dockerfile
          - name: user-service
            context: .
            dockerfile: services/user-service/Dockerfile
          - name: product-service
            context: .
            dockerfile: services/product-service/Dockerfile
          - name: order-service
            context: .
            dockerfile: services/order-service/Dockerfile
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.service.context }}
          file: ${{ matrix.service.dockerfile }}
          push: false
          tags: microservices/${{ matrix.service.name }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
