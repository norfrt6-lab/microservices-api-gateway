name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

env:
  NODE_VERSION: "20"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npm run lint

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        workspace:
          - gateway
          - shared
          - services/user-service
          - services/product-service
          - services/order-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - name: Run tests
        run: npm test --workspace=${{ matrix.workspace }}

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npm run build

  integration:
    name: Integration (Docker Compose)
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - name: Build stack
        run: docker compose -f docker-compose.yml build
      - name: Start stack
        run: docker compose -f docker-compose.yml up -d
      - name: Wait for services
        run: sleep 30
      - name: Run integration tests
        env:
          USER_DB_URL: postgresql://postgres:postgres@localhost:5432/users_db
          PRODUCT_DB_URL: postgresql://postgres:postgres@localhost:5432/products_db
          ORDER_DB_URL: postgresql://postgres:postgres@localhost:5432/orders_db
        run: |
          chmod +x scripts/integration-test.sh
          ./scripts/integration-test.sh http://localhost:3000
      - name: Shutdown stack
        if: always()
        run: docker compose -f docker-compose.yml down -v

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: integration
    if: github.ref == 'refs/heads/main'
    strategy:
      matrix:
        service:
          - name: gateway
            context: .
            dockerfile: gateway/Dockerfile
          - name: user-service
            context: .
            dockerfile: services/user-service/Dockerfile
          - name: product-service
            context: .
            dockerfile: services/product-service/Dockerfile
          - name: order-service
            context: .
            dockerfile: services/order-service/Dockerfile
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.service.context }}
          file: ${{ matrix.service.dockerfile }}
          push: false
          tags: microservices/${{ matrix.service.name }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
